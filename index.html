<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Smath Pollution Game</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #87ceeb;
        overflow: hidden;
        position: relative;
        height: 500px;
        width: 800px;
      }
      #title {
        position: absolute;
        top: 10px;
        left: 300px;
        transform: translateX(-50%);
        font-size: 28px;
        font-weight: bold;
        color: white;
        text-shadow: 2px 2px 4px #000;
        z-index: 10;
      }
      #jellyfish {
        width: 50px;
        height: 50px;
        position: absolute;
        left: 100px;
        top: 100px;
      }
      #attack {
        width: 100px;
        height: 100px;
        position: absolute;
        left: 100px;
        top: 100px;
      }
      #trashboss {
        width: 500px;
        height: 350px;
        position: absolute;
        left: 100px;
        top: 100px;
      }
      #score {
        position: absolute;
        top: 10px;
        left: 10px;
        font-size: 20px;
        color: white;
        text-shadow: 1px 1px 2px #000;
      }

     <div id="platforms"></div>
    </style>
  </head>
  <body>
     <div id="title"> Task: Save the Ocean! </div>
    <div id="score">Trash Collected: 50</div>
    <img id="jellyfish" src="assets/jellyfish.png">
    <img id="trashboss" src="assets/trashboss.png">
    <div id="platform"></div>
    <script src="script.js"></script>
  </body>
</html>
