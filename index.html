<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>Smath Pollution Game</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #87ceeb;
        overflow: hidden;
        position: relative;
        height: 500px;
        width: 800px;
      }
      #title {
        position: absolute;
        top: 30px;
        left: 30px;
        font-size: 28px;
        font-weight: bold;
        color: white;
        text-shadow: 2px 2px 4px #000;
        z-index: 10;
        white-space: nowrap;
      }
       #title2 {
        position: absolute;
        top: 1230px;
        left: 30px;
        font-size: 28px;
        font-weight: bold;
        color: white;
        text-shadow: 2px 2px 4px #000;
        z-index: 10;
        white-space: nowrap;
      }
      #jellyfish {
        width: 50px;
        height: 50px;
        position: absolute;
        left: 100px;
        top: 100px;
      }
      #attack {
        width: 100px;
        height: 100px;
        position: absolute;
        left: 100px;
        top: 100px;
      }
      #trashboss {
        width: 500px;
        height: 350px;
        position: absolute;
        left: 100px;
        top: 100px;
      }
      #score {
        position: absolute;
        top: 625px;
        left: 500px;
        font-size: 28px;
        font-weight: bold;
        color: white;
        text-shadow: 2px 2px 4px #000;
        z-index: 10;
        white-space: nowrap;
      }
      #score2 {
        position: absolute;
        top: 625px;
        left: 30px;
        font-size: 28px;
        font-weight: bold;
        color: white;
        text-shadow: 2px 2px 4px #000;
        z-index: 10;
        white-space: nowrap;
      }
      #trashCount {
        position: absolute;
        top: 625px;
        left: 870px;
        font-size: 28px;
        font-weight: bold;
        color: white;
        text-shadow: 2px 2px 4px #000;
        z-index: 10;
        white-space: nowrap;
      }

    </style>
  </head>
  <body>
    <div id="title"> Task: Save the Ocean! </div>
    <div id="title2"> Task: Beat the Boss! </div>
    <div id="score">Evil Trash Health: 50</div>
    <div id="score2"> Jelly Health: 50</div>
    <div id="trashCount"> Trash Counter: 0</div>
    <img id="jellyfish" src="assets/jellyfish.png">
    <img id="trashboss" src="assets/trashboss.png">
    <div id="platform"></div>
    <script src="script.js"></script>

</html>
